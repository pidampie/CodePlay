<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePlay - Cracked Interface</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@700&family=Source+Code+Pro:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --neon-green: #1db954;
        --dark-core: #061325;
      }

      body {
        /* Memasang gambar intro.png sebagai background halaman utama */
        background: var(--dark-core) url("assets/picture/intro.png") no-repeat
          center center;
        background-size: cover;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Source Code Pro", monospace;
        color: #fff;
        position: relative;
      }

      /* --- INTRO SCREEN CYBER INTERFACE --- */
      #crack-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Menggunakan gambar intro.png yang sama agar transisi ketukan menyatu mulus */
        background: var(--dark-core) url("assets/picture/intro.png") no-repeat
          center center;
        background-size: cover;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition:
          opacity 1s ease,
          transform 1s ease;
      }

      /* Pola overlay agar gambar di halaman intro sedikit lebih gelap & teks menonjol */
      #crack-overlay::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(6, 19, 37, 0.65);
        pointer-events: none;
      }

      /* Teks System Initializing dikembalikan utuh dengan pendar hijau */
      .crack-text {
        color: #fff;
        font-family: "Orbitron", sans-serif;
        letter-spacing: 9px;
        text-align: center;
        animation: pulse-slow 3s infinite;
        z-index: 101;
        text-transform: uppercase;
        text-shadow: 0 0 15px var(--neon-green);
      }

      @keyframes pulse-slow {
        50% {
          opacity: 0.3;
        }
      }

      /* --- CONTENT MAIN --- */
      .hero {
        position: relative;
        z-index: 50;
        text-align: center;
        opacity: 0;
        transform: scale(0.9) translateY(20px);
        transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .hero.active {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      .logo-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 240px;
      }

      .logo-container {
        position: relative;
        display: inline-block;
      }

      .logo {
        font-family: "Audiowide", cursive;
        font-size: clamp(4rem, 11vw, 8.5rem);
        color: #fff;
        margin: 0;
        padding: 0;
        letter-spacing: -2px;
        text-transform: lowercase;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
      }

      .img-lampu {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-70%) rotate(-5deg);
        width: clamp(390px, 24vw, 290px);
        height: auto;
        filter: drop-shadow(0 0 30px rgba(241, 196, 15, 0.6));
        pointer-events: none;
      }

      .img-java {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%) rotate(0deg);
        width: clamp(350px, 25vw, 310px);
        height: auto;
        filter: drop-shadow(0 0 35px rgba(155, 89, 182, 0.5));
        pointer-events: none;
      }

      /* --- BUTTON PLAY DESIGN --- */
      .btn-play {
        margin-top: 15px;
        padding: 10px 95px;
        font-family: "Orbitron", sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        background: #cc0000;
        color: #fff;
        border: 5px solid #fff;
        border-radius: 40px;
        cursor: pointer;
        letter-spacing: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        text-transform: uppercase;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .btn-play:hover {
        background: #ff0000;
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(204, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="bg-orbit">
      <div class="orbit-1"></div>
      <div class="orbit-2"></div>
    </div>

    <div id="crack-overlay" onclick="breakSystem()">
      <div class="crack-line-base l1"></div>
      <div class="crack-line-base l2"></div>
      <p class="crack-text">System Initializing... [Tap]</p>
    </div>

    <div class="hero" id="hero">
      <div class="logo-wrapper">
        <img src="assets/picture/lampu.png" alt="Lampu" class="img-lampu" />

        <div class="logo-container">
          <h1 class="logo">codeplay</h1>
        </div>

        <img src="assets/picture/java.png" alt="Java Phone" class="img-java" />
      </div>

      <button class="btn-play" onclick="location.href = 'menu.html'">
        PLAY
      </button>
    </div>

    <audio id="sfx" src="assets/audio/UI Click.mp3"></audio>
    <audio id="bgmGlobal" src="assets/audio/relax intro full.mp3" loop></audio>

    <script>
      function breakSystem() {
        const sfx = document.getElementById("sfx");
        if (sfx) sfx.play().catch(() => {});

        const bgm = document.getElementById("bgmGlobal");
        if (bgm) {
          bgm.loop = true;
          bgm.volume = 0.4;

          localStorage.setItem("bgmPlaying", "true");
          const savedTime = localStorage.getItem("bgmCurrentTime");
          bgm.currentTime = savedTime ? parseFloat(savedTime) : 0;

          bgm.play().catch(() => {});

          function updateTime() {
            if (!bgm.paused) {
              localStorage.setItem("bgmCurrentTime", bgm.currentTime);
            }
            requestAnimationFrame(updateTime);
          }
          requestAnimationFrame(updateTime);
        }

        document.getElementById("crack-overlay").style.opacity = "0";
        document.getElementById("crack-overlay").style.transform = "scale(1.1)";

        setTimeout(() => {
          document.getElementById("crack-overlay").style.display = "none";
          document.getElementById("hero").classList.add("active");
        }, 800);
      }

      function playClickSound() {
        const sfx = document.getElementById("sfx");
        if (sfx) {
          sfx.currentTime = 0;
          sfx.play().catch((e) => console.log("SFX blocked:", e));
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const menuElements = document.querySelectorAll("button, .btn-play, a");

        menuElements.forEach((el) => {
          el.addEventListener("click", (e) => {
            playClickSound();

            const href = el.getAttribute("href") || el.getAttribute("onclick");
            if (
              href &&
              !href.includes("javascript:void(0)") &&
              el.tagName === "A"
            ) {
              e.preventDefault();
              setTimeout(() => {
                window.location.href = el.href;
              }, 150);
            }
          });
        });
      });
    </script>
  </body>
</html>
